# Configuración Railway — ILUS Gestion
#
# CRÍTICO: Volume Mount para persistencia de archivos subidos
# (contratos, fotos, reportes, etc). Sin esto, Railway BORRA todos
# los archivos físicos en cada deploy porque el filesystem es efímero.
#
# Después de aplicar este archivo, hay que ir a Railway dashboard:
#   1. Service → Settings → Volumes → Add volume
#      Source name: ilus-uploads
#      Mount path:  /data/uploads
#   2. Settings → Variables → agregar:
#      UPLOADS_BASE=/data/uploads
#
# Una vez hecho, los archivos persisten entre deploys.

[build]
builder = "nixpacks"

[deploy]
restartPolicyType = "always"

# Volume mount declarativo (Railway lo aplica si el volume existe)
[[mounts]]
source      = "ilus-uploads"
destination = "/data/uploads"
