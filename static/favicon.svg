<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <!-- Fondo negro ILUS -->
  <rect width="64" height="64" fill="#0a0a0a"/>

  <!-- Cresta (plumas radiales blancas) arriba-derecha, en abanico -->
  <g fill="#ffffff">
    <!-- 6 plumas como cuadriláteros radiales emanando desde el tope del casco hacia arriba-derecha -->
    <polygon points="30,18 32,5 35,5 33,18"/>
    <polygon points="33,18 39,6 42,7 36,19"/>
    <polygon points="36,19 45,9 47,11 38,20"/>
    <polygon points="38,20 49,13 51,15 40,22"/>
    <polygon points="40,22 52,18 53,21 41,24"/>
    <polygon points="41,24 54,23 54,26 42,26"/>
  </g>

  <!-- Cuerpo principal del casco BLANCO SÓLIDO, mirando a la izquierda -->
  <g fill="#ffffff">
    <!-- Domo + visera + nariguera + barbero como un solo polígono complejo.
         Coordenadas: izquierda = nariguera (frente), derecha = barbero (atrás).
         Orden: parte arriba del domo → atrás (barbero) → bajo → adelante (mentón/nariguera) → arriba nariguera → cierra. -->
    <path d="
      M 30,18
      C 24,18 18,22 16,28
      L 14,33
      L 13,38
      L 14,42
      L 16,45
      L 18,46
      L 20,46
      L 22,45
      L 24,44
      C 26,44 28,45 30,46
      L 33,47
      L 36,48
      L 40,49
      L 44,49
      L 47,47
      L 48,44
      L 47,41
      L 45,39
      L 43,38
      L 42,36
      L 43,33
      L 44,30
      L 44,27
      L 43,24
      L 41,21
      L 38,19
      L 34,18
      Z
    "/>
  </g>

  <!-- HUECOS / detalles negros encima del blanco -->
  <g fill="#0a0a0a">
    <!-- Ojo del visor: almendra horizontal en el centro-izquierda de la cara -->
    <ellipse cx="22" cy="32" rx="5" ry="2"/>

    <!-- Separaciones entre plumas de la cresta (líneas negras radiales) -->
    <polygon points="32.2,18 33.2,5 33.0,5 32.0,18"/>
    <polygon points="35.5,18.5 41.0,6.5 40.7,6.5 35.2,18.5"/>
    <polygon points="38.2,19.5 46.5,10 46.2,10 37.9,19.5"/>
    <polygon points="40.0,21 50.5,14 50.2,14 39.7,21"/>
    <polygon points="41.0,23 52.7,19.5 52.4,19.5 40.7,23"/>

    <!-- Separación entre domo y visera (línea de la frente) -->
    <path d="M 17,30 Q 24,29 31,30 L 31,31 Q 24,30 17,31 Z"/>

    <!-- Separación entre visera y nariguera (corte vertical sutil delante del ojo) -->
    <path d="M 16,34 L 17,34 L 17,40 L 16,40 Z"/>

    <!-- Separación entre barbero y domo (línea trasera curva sutil) -->
    <path d="M 41,28 Q 43,33 41,38 L 40,38 Q 42,33 40,28 Z"/>
  </g>
</svg>
