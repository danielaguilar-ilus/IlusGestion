<?xml version="1.0" encoding="UTF-8"?>
<!--
  ILUS - favicon casco espartano (v2)
  Vista de perfil mirando a la DERECHA, estilo mascota Spartan
  Optimizado para legibilidad a 16x16 px (pestaña del navegador)
  Paleta: negro #0a0a0a (fondo) + blanco #ffffff (casco) - sin gradientes
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">

  <!-- Fondo negro con esquinas redondeadas -->
  <rect x="0" y="0" width="64" height="64" rx="10" fill="#0a0a0a"/>

  <g fill="#ffffff">

    <!-- =========================================================
         CRESTA TIPO PEINE (mohawk radial)
         5 franjas verticales que se abren en abanico desde la cima.
         A 16x16 se leen como una corona dentada.
         ========================================================= -->
    <!-- Franja 1 (la mas inclinada hacia atras-izquierda) -->
    <path d="M 19 9 L 22 9 L 24 22 L 21 22 Z"/>
    <!-- Franja 2 -->
    <path d="M 24 7 L 27 7 L 28 22 L 25 22 Z"/>
    <!-- Franja 3 (central, la mas alta) -->
    <path d="M 29 6 L 32 6 L 32 22 L 29 22 Z"/>
    <!-- Franja 4 -->
    <path d="M 34 7 L 37 7 L 36 22 L 33 22 Z"/>
    <!-- Franja 5 (la mas inclinada hacia adelante-derecha) -->
    <path d="M 39 9 L 42 9 L 40 22 L 37 22 Z"/>

    <!-- =========================================================
         BASE DE LA CRESTA (semicirculo que une las franjas con el casco)
         ========================================================= -->
    <path d="M 18 22
             Q 18 18, 22 17
             L 41 17
             Q 44 18, 44 22
             Z"/>

    <!-- =========================================================
         CUERPO DEL CASCO - perfil mirando a la derecha
         Cupula redondeada arriba, visor angular adelante (derecha),
         barba triangular atras (izquierda), nariguera al frente.
         ========================================================= -->
    <path d="M 17 22
             C 16 26, 16 30, 17 34
             C 17 37, 19 40, 22 42
             L 20 48
             L 22 50
             L 28 49
             L 32 47
             C 33 49, 35 50, 37 50
             L 38 46
             L 42 46
             L 44 42
             L 46 38
             C 47 34, 47 30, 46 26
             C 45 23, 43 22, 41 22
             Z"/>

    <!-- =========================================================
         NARIGUERA frontal (baja casi vertical desde el visor)
         ========================================================= -->
    <path d="M 44 30
             L 46 30
             L 47 44
             L 45 46
             L 43 44
             Z"/>

  </g>

  <!-- =========================================================
       OJO en almendra (hueco negro sobre el casco blanco)
       ubicado cerca del visor frontal, lado derecho.
       ========================================================= -->
  <path d="M 36 32
           Q 39 30, 42 32
           Q 39 35, 36 33 Z"
        fill="#0a0a0a"/>

  <!-- =========================================================
       SEPARACION entre visor frontal y barba (linea negra fina
       que da definicion a la mandibula del casco)
       ========================================================= -->
  <path d="M 32 47
           L 34 44
           L 36 47 Z"
        fill="#0a0a0a"/>

</svg>
