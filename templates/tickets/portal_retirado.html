<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ILUS · Tu ticket</title>
<link rel="icon" href="{{ url_for('static', filename='Logo.png') }}">
<style>
:root{--ilus-red:#dc2626;}
*{box-sizing:border-box;}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;padding:20px;}
.pe-card{background:#fff;border-radius:16px;max-width:440px;width:100%;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.4);border-top:4px solid var(--ilus-red);}
.pe-logo{background:#0a0a0a;padding:22px 0;text-align:center;}
.pe-logo img{height:34px;}
.pe-body{padding:32px 32px 36px;text-align:center;}
.pe-body h1{font-size:1.15rem;font-weight:900;margin:0 0 10px;color:#0a0a0a;}
.pe-body p{font-size:.9rem;color:#374151;margin:0;line-height:1.55;}
.pe-body .sub{margin-top:18px;font-size:.78rem;color:#9ca3af;}
</style>
</head>
<body>
<div class="pe-card">
  <div class="pe-logo"><img src="{{ url_for('static', filename='Logo.png') }}" alt="ILUS"></div>
  <div class="pe-body">
    <h1>Este enlace ya no está en uso</h1>
    <p>Para continuar tu caso, responde directamente el correo de tu ticket
      (sin cambiar el asunto) y tu mensaje le llegará al equipo al instante.</p>
    <div class="sub">ILUS Sport &amp; Health</div>
  </div>
</div>
</body>
</html>
