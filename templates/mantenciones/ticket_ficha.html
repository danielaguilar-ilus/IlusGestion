{% extends "base.html" %}
{% block title %}Ticket — ILUS{% endblock %}
{% block content %}
<style>
.tf-hero{background:linear-gradient(135deg,#0a0a0a 0%,#1a1a1a 50%,#2a0d0d 100%);
  color:#fff;border-radius:14px;padding:18px 24px;margin-bottom:16px;
  box-shadow:0 4px 18px rgba(0,0,0,.14);}
.tf-num{background:#fef3c7;color:#92400e;padding:5px 12px;border-radius:7px;
  font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:800;}
.tf-title{font-size:1.4rem;font-weight:900;margin:6px 0 4px;letter-spacing:-.01em;}
.tf-sub{font-size:.88rem;color:#cfd3da;}

.tf-meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;margin-top:14px;}
.tf-meta-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:10px 12px;}
.tf-meta-lbl{font-size:.62rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
.tf-meta-val{font-size:.95rem;color:#fff;font-weight:700;margin-top:2px;}

.tf-card{background:#fff;border:1px solid #eaecf0;border-radius:12px;padding:18px 22px;margin-bottom:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);}
.tf-card h6{font-size:.85rem;font-weight:800;color:#0f172a;margin-bottom:12px;letter-spacing:-.01em;}

.tf-eq-row{display:flex;align-items:center;gap:10px;padding:10px 12px;
  border:1px solid #e5e7eb;border-radius:8px;margin-bottom:6px;}

.tf-evt{display:flex;gap:10px;padding:10px;border-left:3px solid #e5e7eb;margin-bottom:5px;}
.tf-evt.cambio_estado{border-left-color:#f59e0b;}
.tf-evt.asignacion{border-left-color:#3b82f6;}
.tf-evt.creacion{border-left-color:#16a34a;}
.tf-evt.comentario{border-left-color:#6b7280;}

.tf-badge{padding:3px 9px;border-radius:50px;font-size:.66rem;font-weight:800;
  letter-spacing:.05em;text-transform:uppercase;}
.bs-abierto{background:#dbeafe;color:#1e40af;}
.bs-en_proceso{background:#fef3c7;color:#92400e;}
.bs-esperando_cliente{background:#e0e7ff;color:#3730a3;}
.bs-esperando_repuesto{background:#fce7f3;color:#9d174d;}
.bs-resuelto{background:#dcfce7;color:#166534;}
.bs-cerrado{background:#f3f4f6;color:#6b7280;}
.bs-cancelado{background:#fee2e2;color:#991b1b;}

.bp-urgente{background:#fee2e2;color:#991b1b;}
.bp-alta{background:#fed7aa;color:#9a3412;}
.bp-media{background:#e5e7eb;color:#374151;}
.bp-baja{background:#f1f5f9;color:#475569;}
</style>

<div id="tf_container">
  <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
</div>

{% endblock %}

{% block scripts %}
<script>
const TID = {{ ticket_id }};
let TICKET_DATA = null;

async function cargarTicket() {
  try {
    const r = await fetch(`/mantenciones/api/tickets/${TID}`);
    const d = await r.json();
    if (!d.ok) {
      document.getElementById('tf_container').innerHTML =
        `<div class="alert alert-danger">${d.error}</div>`;
      return;
    }
    TICKET_DATA = d;
    renderTicket(d);
  } catch(e) {
    document.getElementById('tf_container').innerHTML =
      `<div class="alert alert-danger">Error: ${e.message}</div>`;
  }
}

function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtFecha(d){ return d ? new Date(d).toLocaleString('es-CL') : '—'; }

function renderTicket(d) {
  const t = d.ticket;
  const cont = document.getElementById('tf_container');
  cont.innerHTML = `
    <div class="tf-hero">
      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
          <span class="tf-num">${esc(t.numero_ticket || ('TKT#'+t.id))}</span>
          <span class="tf-badge bs-${t.estado} ms-2">${(t.estado||'').replace('_',' ')}</span>
          <span class="tf-badge bp-${t.prioridad} ms-1">${t.prioridad}</span>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <a href="/mantenciones/clientes/${t.cliente_id}" class="btn btn-sm btn-outline-light">
            <i class="bi bi-building me-1"></i>Ver ficha cliente
          </a>
          <a href="/mantenciones/tickets" class="btn btn-sm btn-outline-light">
            <i class="bi bi-arrow-left me-1"></i>Volver
          </a>
        </div>
      </div>
      <div class="tf-title">${esc(t.titulo)}</div>
      <div class="tf-sub"><i class="bi bi-building me-1"></i>${esc(t.razon_social)}
        ${t.cliente_rut ? '· ' + esc(t.cliente_rut) : ''}</div>

      <div class="tf-meta-grid">
        <div class="tf-meta-card">
          <div class="tf-meta-lbl">Tipo</div>
          <div class="tf-meta-val">${esc(t.tipo)}</div>
        </div>
        ${t.solicitante ? `<div class="tf-meta-card">
          <div class="tf-meta-lbl">Solicitante</div>
          <div class="tf-meta-val" style="font-size:.85rem">${esc(t.solicitante)}</div>
        </div>` : ''}
        ${t.tecnico_nombre ? `<div class="tf-meta-card">
          <div class="tf-meta-lbl">Técnico</div>
          <div class="tf-meta-val" style="font-size:.85rem">${esc(t.tecnico_nombre)}</div>
        </div>` : ''}
        ${t.fecha_limite ? `<div class="tf-meta-card">
          <div class="tf-meta-lbl">SLA</div>
          <div class="tf-meta-val" style="font-size:.85rem">${esc(t.fecha_limite)}</div>
        </div>` : ''}
        <div class="tf-meta-card">
          <div class="tf-meta-lbl">Canal origen</div>
          <div class="tf-meta-val" style="font-size:.85rem">${esc(t.canal_origen)}</div>
        </div>
        ${t.visita_id ? `<div class="tf-meta-card" style="background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.3)">
          <div class="tf-meta-lbl" style="color:#86efac">OT vinculada</div>
          <div class="tf-meta-val"><a href="/mantenciones/ot/${t.visita_id}" style="color:#fff">Ver OT →</a></div>
        </div>` : ''}
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-8">
        <div class="tf-card">
          <h6><i class="bi bi-card-text me-1 text-primary"></i>Descripción</h6>
          <div style="white-space:pre-wrap">${esc(t.descripcion || '(sin descripción)')}</div>
          ${t.notas_internas ? `<hr><div class="small text-muted"><strong>Notas internas:</strong> ${esc(t.notas_internas)}</div>` : ''}
        </div>

        <div class="tf-card">
          <h6><i class="bi bi-wrench me-1 text-warning"></i>Equipos afectados (${d.equipos.length})</h6>
          ${d.equipos.length ? d.equipos.map(e => `
            <div class="tf-eq-row">
              <i class="bi bi-gear-fill text-secondary"></i>
              <div class="flex-grow-1">
                <div class="fw-bold">${esc(e.nombre || 'Máquina')}</div>
                <div class="small text-muted">
                  ${e.sku ? 'SKU '+esc(e.sku) : ''}${e.serie ? ' · S/N '+esc(e.serie) : ''}
                  ${e.cantidad > 1 ? ' · ×'+e.cantidad : ''}
                </div>
              </div>
            </div>`).join('') : '<div class="small text-muted">Sin equipos vinculados</div>'}
        </div>

        <div class="tf-card">
          <h6><i class="bi bi-chat-square-text me-1 text-success"></i>Bitácora</h6>
          <div class="d-flex gap-2 mb-3">
            <input type="text" id="comentInput" class="form-control form-control-sm"
                   placeholder="Agregar comentario o nota…" onkeydown="if(event.key==='Enter') agregarComentario()">
            <button class="btn btn-sm btn-primary" onclick="agregarComentario()">
              <i class="bi bi-send"></i>
            </button>
          </div>
          ${d.bitacora.length ? d.bitacora.map(b => `
            <div class="tf-evt ${b.tipo}">
              <div class="flex-grow-1">
                <div class="small">
                  <strong>${esc(b.usuario || 'sistema')}</strong>
                  <span class="text-muted ms-2" style="font-size:.72rem">${fmtFecha(b.created_at)}</span>
                  <span class="badge bg-secondary ms-1" style="font-size:.6rem">${b.tipo.replace('_',' ')}</span>
                </div>
                <div class="mt-1" style="white-space:pre-wrap">${esc(b.contenido)}</div>
              </div>
            </div>`).join('') : '<div class="small text-muted">Sin eventos en la bitácora</div>'}
        </div>
      </div>

      <div class="col-lg-4">
        <div class="tf-card">
          <h6><i class="bi bi-gear me-1 text-secondary"></i>Acciones</h6>
          <div class="mb-2">
            <label class="form-label small fw-semibold">Cambiar estado</label>
            <select class="form-select form-select-sm" onchange="cambiarEstado(this.value)">
              ${['abierto','en_proceso','esperando_cliente','esperando_repuesto','resuelto','cerrado','cancelado']
                .map(s => `<option value="${s}" ${s === t.estado ? 'selected':''}>${s.replace('_',' ')}</option>`).join('')}
            </select>
          </div>
          ${!t.visita_id ? `
          <button class="btn btn-sm btn-dark w-100 fw-bold mb-2" onclick="convertirEnOT()"
                  style="background:linear-gradient(135deg,#0a0a0a,#2a0d0d)">
            <i class="bi bi-clipboard-plus me-1"></i>Convertir en OT
          </button>` : `
          <a href="/mantenciones/ot/${t.visita_id}" class="btn btn-sm btn-outline-success w-100 fw-bold mb-2">
            <i class="bi bi-clipboard-check me-1"></i>Ver OT vinculada
          </a>`}
          <button class="btn btn-sm btn-outline-danger w-100" onclick="eliminarTicket()">
            <i class="bi bi-trash me-1"></i>Eliminar ticket
          </button>
        </div>

        <div class="tf-card">
          <h6><i class="bi bi-person me-1"></i>Solicitante</h6>
          <div class="small">
            ${t.solicitante ? `<div><strong>${esc(t.solicitante)}</strong></div>` : '<div class="text-muted">Sin solicitante</div>'}
            ${t.solicitante_tel ? `<div><i class="bi bi-telephone me-1"></i>${esc(t.solicitante_tel)}</div>` : ''}
            ${t.solicitante_email ? `<div><i class="bi bi-envelope me-1"></i>${esc(t.solicitante_email)}</div>` : ''}
          </div>
        </div>

        <div class="tf-card">
          <h6><i class="bi bi-info-circle me-1"></i>Información</h6>
          <div class="small">
            <div><strong>Creado:</strong> ${fmtFecha(t.created_at)}</div>
            <div><strong>Por:</strong> ${esc(t.created_by || '—')}</div>
            <div><strong>Asignado:</strong> ${esc(t.asignado_a || '—')}</div>
            ${t.cerrado_at ? `<div><strong>Cerrado:</strong> ${fmtFecha(t.cerrado_at)} por ${esc(t.cerrado_por)}</div>` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

async function cambiarEstado(nuevo) {
  try {
    const r = await fetch(`/mantenciones/api/tickets/${TID}`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({estado: nuevo})
    });
    const d = await r.json();
    if (d.ok) cargarTicket();
    else alert(d.error);
  } catch(e) { alert('Error: '+e.message); }
}

async function agregarComentario() {
  const inp = document.getElementById('comentInput');
  const txt = inp.value.trim();
  if (!txt) return;
  try {
    const r = await fetch(`/mantenciones/api/tickets/${TID}/comentario`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({contenido: txt, es_interno: true})
    });
    const d = await r.json();
    if (d.ok) { inp.value = ''; cargarTicket(); }
    else alert(d.error);
  } catch(e) { alert('Error: '+e.message); }
}

async function convertirEnOT() {
  const fecha = await ilusPrompt({
    title: 'Convertir ticket en OT',
    message: 'Fecha programada para la OT:',
    sub: 'Deja vacío para usar la fecha límite del ticket o hoy + 2 días.',
    inputType: 'date',
    required: false,
    okLabel: 'Crear OT',
  });
  if (fecha === null) return;
  try {
    const r = await fetch(`/mantenciones/api/tickets/${TID}/convertir-en-ot`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({fecha_programada: fecha || null})
    });
    const d = await r.json();
    if (d.ok) {
      await ilusAlert({
        title: 'OT creada',
        message: `OT ${d.numero_ot} creada con ${d.tareas_creadas} tarea(s).`,
        sub: 'Fecha: ' + d.fecha_programada,
        type: 'success',
      });
      window.location = `/mantenciones/ot/${d.visita_id}`;
    } else { ilusToast('Error: ' + d.error, { type:'error' }); }
  } catch(e) { ilusToast('Error: '+e.message, { type:'error' }); }
}

async function eliminarTicket() {
  const ok = await ilusConfirm({
    title: 'Eliminar ticket',
    message: '¿Eliminar permanentemente este ticket?',
    sub: 'La OT vinculada (si existe) NO se elimina.',
    okLabel: 'Sí, eliminar',
    cancelLabel: 'Cancelar',
    danger: true,
  });
  if (!ok) return;
  try {
    const r = await fetch(`/mantenciones/api/tickets/${TID}`, {method: 'DELETE'});
    const d = await r.json();
    if (d.ok) window.location = '/mantenciones/tickets';
    else ilusToast(d.error, { type:'error' });
  } catch(e) { ilusToast('Error: '+e.message, { type:'error' }); }
}

cargarTicket();
</script>
{% endblock %}
