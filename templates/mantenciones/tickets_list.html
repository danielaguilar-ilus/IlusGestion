{% extends "base.html" %}
{% block title %}Tickets — ILUS{% endblock %}
{% block content %}
<style>
.tk-hero{background:linear-gradient(135deg,#0a0a0a 0%,#1a1a1a 50%,#2a0d0d 100%);
  color:#fff;border-radius:14px;padding:18px 24px;margin-bottom:18px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
  box-shadow:0 4px 18px rgba(0,0,0,.14);}
.tk-hero h4{margin:0;font-weight:900;letter-spacing:-.01em;}
.tk-hero .sub{font-size:.86rem;color:#cfd3da;}

.tk-kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;margin-bottom:14px;}
.tk-kpi{background:#fff;border:1px solid #eaecf0;border-radius:11px;
  padding:12px 14px;display:flex;flex-direction:column;gap:2px;}
.tk-kpi .num{font-size:1.5rem;font-weight:900;line-height:1;}
.tk-kpi .lbl{font-size:.68rem;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;font-weight:700;}
.tk-kpi.t .num{color:#0f172a;}
.tk-kpi.a .num{color:#1d4ed8;}
.tk-kpi.u .num{color:#dc2626;}
.tk-kpi.v .num{color:#b91c1c;}

.tk-filtros{background:#fff;border:1px solid #eaecf0;border-radius:11px;
  padding:10px 12px;margin-bottom:12px;}

.tk-row{background:#fff;border:1px solid #eaecf0;border-radius:10px;
  padding:12px 14px;margin-bottom:8px;display:grid;
  grid-template-columns:auto 1fr auto auto auto auto;gap:10px;align-items:center;
  transition:all .12s;border-left:4px solid #e5e7eb;}
.tk-row:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.07);}
.tk-row.prio-urgente{border-left-color:#dc2626;}
.tk-row.prio-alta{border-left-color:#f59e0b;}
.tk-row.prio-media{border-left-color:#6b7280;}
.tk-row.prio-baja{border-left-color:#94a3b8;}

.tk-num{background:#fef3c7;color:#92400e;padding:5px 10px;border-radius:7px;
  font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:800;
  letter-spacing:.04em;white-space:nowrap;}
.tk-meta{min-width:0;}
.tk-cliente{font-weight:800;font-size:.95rem;color:#0f172a;}
.tk-titulo{font-size:.82rem;color:#374151;margin-top:1px;}
.tk-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.tk-pill{display:inline-flex;align-items:center;gap:3px;font-size:.65rem;
  padding:1px 7px;border-radius:50px;border:1px solid #e5e7eb;background:#f9fafb;color:#6b7280;}

.tk-badge{padding:3px 9px;border-radius:50px;font-size:.64rem;font-weight:800;
  letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
.bs-abierto{background:#dbeafe;color:#1e40af;}
.bs-en_proceso{background:#fef3c7;color:#92400e;}
.bs-esperando_cliente{background:#e0e7ff;color:#3730a3;}
.bs-esperando_repuesto{background:#fce7f3;color:#9d174d;}
.bs-resuelto{background:#dcfce7;color:#166534;}
.bs-cerrado{background:#f3f4f6;color:#6b7280;}
.bs-cancelado{background:#fee2e2;color:#991b1b;}

.bp-urgente{background:#fee2e2;color:#991b1b;}
.bp-alta{background:#fed7aa;color:#9a3412;}
.bp-media{background:#e5e7eb;color:#374151;}
.bp-baja{background:#f1f5f9;color:#475569;}

.empty-state{background:#fff;border:1px solid #eaecf0;border-radius:14px;
  padding:50px 30px;text-align:center;}
.empty-state i{font-size:3rem;opacity:.25;color:#9ca3af;display:block;margin-bottom:8px;}
</style>

<div class="tk-hero">
  <div>
    <h4><i class="bi bi-ticket-perforated me-2"></i>Tickets</h4>
    <div class="sub">Solicitudes, fallas, cambios y consultas del cliente</div>
  </div>
  <div class="d-flex gap-2 flex-wrap">
    <a href="{{ url_for('mant_index') }}" class="btn btn-sm btn-outline-light">
      <i class="bi bi-arrow-left me-1"></i>Dashboard
    </a>
    <a href="{{ url_for('mant_ticket_nuevo') }}" class="btn btn-sm btn-light fw-bold">
      <i class="bi bi-plus-circle me-1"></i>Nuevo ticket
    </a>
  </div>
</div>

<div class="tk-kpi-row">
  <div class="tk-kpi t"><div class="num" id="kpi_total">—</div><div class="lbl"><i class="bi bi-ticket me-1"></i>Total</div></div>
  <div class="tk-kpi a"><div class="num" id="kpi_activos">—</div><div class="lbl"><i class="bi bi-arrow-clockwise me-1"></i>Activos</div></div>
  <div class="tk-kpi u"><div class="num" id="kpi_urgentes">—</div><div class="lbl"><i class="bi bi-exclamation-triangle me-1"></i>Urgentes</div></div>
  <div class="tk-kpi v"><div class="num" id="kpi_vencidos">—</div><div class="lbl"><i class="bi bi-clock-history me-1"></i>SLA vencido</div></div>
</div>

<div class="tk-filtros">
  <div class="row g-2 align-items-end">
    <div class="col-md-4">
      <input type="text" id="f_q" class="form-control form-control-sm" placeholder="🔍 Buscar por título, n° ticket, cliente…"
             onkeyup="if(event.key==='Enter') cargar()">
    </div>
    <div class="col-md-2">
      <select id="f_estado" class="form-select form-select-sm" onchange="cargar()">
        <option value="">Todos los estados</option>
        <option value="abierto">Abierto</option>
        <option value="en_proceso">En proceso</option>
        <option value="esperando_cliente">Esperando cliente</option>
        <option value="esperando_repuesto">Esperando repuesto</option>
        <option value="resuelto">Resuelto</option>
        <option value="cerrado">Cerrado</option>
        <option value="cancelado">Cancelado</option>
      </select>
    </div>
    <div class="col-md-2">
      <select id="f_prio" class="form-select form-select-sm" onchange="cargar()">
        <option value="">Todas prioridades</option>
        <option value="urgente">Urgente</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
    </div>
    <div class="col-md-2">
      <select id="f_tipo" class="form-select form-select-sm" onchange="cargar()">
        <option value="">Todos los tipos</option>
        <option value="cambio">Cambio</option>
        <option value="garantia">Garantía</option>
        <option value="falla">Falla</option>
        <option value="consulta">Consulta</option>
        <option value="cotizacion">Cotización</option>
        <option value="presupuesto">Presupuesto</option>
        <option value="seguimiento">Seguimiento</option>
      </select>
    </div>
    <div class="col-md-2">
      <button class="btn btn-sm btn-ilus w-100" onclick="cargar()">
        <i class="bi bi-funnel me-1"></i>Filtrar
      </button>
    </div>
  </div>
</div>

<div id="tk_lista">
  <div class="text-center py-4 text-muted">
    <div class="spinner-border spinner-border-sm me-2"></div>Cargando tickets…
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
async function cargar(){
  const q = document.getElementById('f_q').value.trim();
  const estado = document.getElementById('f_estado').value;
  const prio = document.getElementById('f_prio').value;
  const tipo = document.getElementById('f_tipo').value;
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (estado) params.set('estado', estado);
  if (prio) params.set('prioridad', prio);
  if (tipo) params.set('tipo', tipo);

  try {
    const r = await fetch('/mantenciones/api/tickets?' + params.toString());
    const d = await r.json();
    if (!d.ok) { document.getElementById('tk_lista').innerHTML =
      `<div class="alert alert-danger">Error: ${d.error}</div>`; return; }

    const k = d.kpis || {};
    document.getElementById('kpi_total').textContent = k.total || 0;
    document.getElementById('kpi_activos').textContent = k.activos || 0;
    document.getElementById('kpi_urgentes').textContent = k.urgentes || 0;
    document.getElementById('kpi_vencidos').textContent = k.vencidos || 0;

    if (!d.tickets || d.tickets.length === 0) {
      document.getElementById('tk_lista').innerHTML = `
        <div class="empty-state">
          <i class="bi bi-ticket-perforated"></i>
          <div class="fw-bold">Sin tickets ${q||estado||prio||tipo ? 'con esos filtros' : 'aún'}</div>
          <a href="/mantenciones/tickets/nuevo" class="btn btn-sm btn-ilus mt-2">
            <i class="bi bi-plus-circle me-1"></i>Crear el primer ticket
          </a>
        </div>`;
      return;
    }

    const fmtFecha = (d) => d ? new Date(d).toLocaleDateString('es-CL',
                              {day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
    const esc = (s) => String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    let html = '';
    for (const t of d.tickets) {
      const prio = t.prioridad || 'media';
      html += `<div class="tk-row prio-${prio}" onclick="window.location='/mantenciones/tickets/${t.id}'" style="cursor:pointer">
        <div><span class="tk-num">${esc(t.numero_ticket || ('#'+t.id))}</span></div>
        <div class="tk-meta">
          <div class="tk-cliente">${esc(t.razon_social)}</div>
          <div class="tk-titulo">${esc(t.titulo)}</div>
          <div class="tk-pills">
            <span class="tk-pill"><i class="bi bi-tag"></i>${esc(t.tipo||'consulta')}</span>
            ${t.solicitante ? `<span class="tk-pill"><i class="bi bi-person"></i>${esc(t.solicitante)}</span>` : ''}
            ${t.tecnico_nombre ? `<span class="tk-pill"><i class="bi bi-person-badge"></i>${esc(t.tecnico_nombre)}</span>` : ''}
            ${t.n_equipos > 0 ? `<span class="tk-pill"><i class="bi bi-wrench"></i>${t.n_equipos} equipo(s)</span>` : ''}
            ${t.visita_id ? `<span class="tk-pill" style="background:#dcfce7;color:#166534"><i class="bi bi-clipboard-check"></i>OT #${t.visita_id}</span>` : ''}
          </div>
        </div>
        <div class="text-end"><span class="tk-badge bp-${prio}">${prio}</span></div>
        <div class="text-end"><span class="tk-badge bs-${t.estado}">${(t.estado||'').replace('_',' ')}</span></div>
        <div class="text-end small text-muted">${fmtFecha(t.created_at)}</div>
        <div class="text-end"><i class="bi bi-chevron-right text-muted"></i></div>
      </div>`;
    }
    document.getElementById('tk_lista').innerHTML = html;
  } catch(e) {
    document.getElementById('tk_lista').innerHTML =
      `<div class="alert alert-danger">Error de red: ${e.message}</div>`;
  }
}
cargar();
</script>
{% endblock %}
