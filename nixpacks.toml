# ════════════════════════════════════════════════════════════════════
#  ⚠️  NIXPACKS.TOML — CONFIGURACIÓN DE BUILD DE RAILWAY
# ════════════════════════════════════════════════════════════════════
#
#  🔴 NO CREAR railway.toml NI railpack.toml EN ESTE PROYECTO.
#     Cuando existía railway.toml con RAILPACK, los deploys fallaban con
#     "pip: command not found" (ver commit 43f91f5). El stack correcto
#     en este proyecto es nixpacks (es el default si no hay railway.toml).
#
#  🔴 NO TOCAR --with-deps. Si Chromium falla en runtime, hay un
#     auto-install fallback en app.py (_pw_install_chromium_runtime).
#     Esa función intenta `python -m playwright install chromium` desde
#     el código si falta el binario al servir el primer PDF.
#
#  🔴 NO PINEAR a Python específico (deja el default de Railway).
#     Hubo intentos previos con `nixPkgs = ["python311"]` y romper Python
#     3.13 que ya funciona con todo lo demás.
# ════════════════════════════════════════════════════════════════════

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium --with-deps"
]
