# ════════════════════════════════════════════════════════════════════
#  NIXPACKS.TOML — RAILWAY = SOLO REDIRECTOR A GOOGLE  (2026-06-13)
# ════════════════════════════════════════════════════════════════════
#  Railway dejó de correr la app completa: ahora SOLO reenvía el link
#  viejo (web-production-85732.up.railway.app) al nuevo de Google
#  (https://ilus-app-469212710544.southamerica-west1.run.app), preservando
#  ruta + query. La lógica está en railway_redirect.py.
#
#  POR QUÉ: la app completa (requirements.txt con greenlet/pymssql/GCS +
#  Chromium de playwright) NO levantaba en el build de Railway → 502
#  constante. El redirector solo necesita flask + gunicorn → build rápido
#  y a prueba de fallos.
#
#  ⚠️  ESTE ARCHIVO LO USA SOLO RAILWAY. Google Cloud Run usa el Dockerfile
#      y la app completa (`app:app`) — NO toca este archivo. No mezclar.
#  🔴 NO crear railway.toml ni railpack.toml (rompía con "pip: command not
#     found" — ver commit 43f91f5).
#  Cambiar destino sin tocar código: env var ILUS_REDIRECT_TO en Railway.
# ════════════════════════════════════════════════════════════════════

[phases.install]
cmds = ["pip install flask gunicorn"]

[start]
cmd = "gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --access-logfile - --error-logfile - railway_redirect:app"
