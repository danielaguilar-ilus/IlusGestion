# ════════════════════════════════════════════════════════════════════
#  Nixpacks config — Railway deploy
# ════════════════════════════════════════════════════════════════════
#  HISTORIA:
#  - El error "BrowserType.launch: Executable doesn't exist at
#    /root/.cache/ms-playwright/chromium_headless_shell-1217" significaba
#    que la versión de playwright en pip avanzó pero el binario de Chromium
#    en la cache de Railway era anterior, así que no coincidían.
#  - FIX: pinear playwright en requirements.txt + descargar el binario en
#    /app/.pw-browsers (parte de la imagen final, no de /root/.cache que
#    Nixpacks puede invalidar) + setear PLAYWRIGHT_BROWSERS_PATH para que
#    al ejecutar en runtime busque en el mismo path.
# ════════════════════════════════════════════════════════════════════

[phases.setup]
# Dependencias de sistema requeridas por Chromium headless. Reemplaza al
# antiguo "--with-deps" que en Railway/nixpacks no encuentra apt como root.
aptPkgs = [
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2",
  "libatspi2.0-0",
  "fonts-liberation",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
]

[phases.build]
dependsOn = ["install"]
cmds = [
  # Descarga Chromium dentro del workdir (sobrevive al deploy).
  # Si falla el build, no abortamos: el código tiene fallback que
  # auto-instala Chromium al primer PDF en runtime (lazy install).
  # Esto hace el deploy más robusto a problemas de red en build phase.
  "mkdir -p /app/.pw-browsers",
  "PLAYWRIGHT_BROWSERS_PATH=/app/.pw-browsers python -m playwright install chromium || echo '[playwright] Build install failed — runtime fallback will retry'",
  "ls -la /app/.pw-browsers/ || true",
]

[start]
cmd = "gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 300 app:app"

[variables]
# CRÍTICO: tanto build como runtime usan este path para que el binario
# que se descarga en build sea el mismo que playwright busca en runtime.
PLAYWRIGHT_BROWSERS_PATH = "/app/.pw-browsers"
